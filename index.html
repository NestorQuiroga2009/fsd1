<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Imágenes de Fondo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .seccion {
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            text-shadow: 2px 2px 5px black;
        }

        .img1 {
            background-image: url('https://picsum.photos/id/1018/1920/1080');
        }

        .img2 {
            background-image: url('https://picsum.photos/id/1015/1920/1080');
        }

        .img3 {
            background-image: url('https://picsum.photos/id/1019/1920/1080');
        }
    </style>
</head>
<body>

    <div class="seccion img1">
        Sección 1
    </div>

    <div class="seccion img2">
        Sección 2
    </div>

    <div class="seccion img3">
        Sección 3
    </div>

</body>
</html>
