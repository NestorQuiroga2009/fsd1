<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fondo con Imagen</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('https://picsum.photos/1600/900'); /* Cambiá esta URL */
            background-size: cover;       /* Ajusta la imagen a toda la pantalla */
            background-position: center;  /* Centra la imagen */
            background-repeat: no-repeat; /* Evita que se repita */
            height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
        }

        .contenido {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Oscurece un poco el fondo */
        }
    </style>
</head>
<body>
    <div class="contenido">
        <h1>Hola, este es tu fondo con imagen</h1>
    </div>
</body>
</html>
